<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JP's Travel World</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a1a;--card:#12122a;--card2:#1a1a3e;--accent:#ff6b6b;--accent2:#feca57;--accent3:#48dbfb;--accent4:#ff9ff3;--text:#f0f0f0;--text2:#8888aa;--glass:rgba(18,18,42,0.85)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-brand h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-brand .subtitle{font-size:11px;color:var(--text2);font-weight:400}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 16px;border-radius:20px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.3s}
.nav-tab.active{background:var(--accent);color:#fff}
.nav-tab:hover{color:#fff}

/* VIEWS */
.view{display:none;padding-top:60px;min-height:100vh}
.view.active{display:block}

/* MAP VIEW */
#mapView{padding-top:60px}
#map{width:100vw;height:calc(100vh - 60px)}
.btn-float{position:fixed;z-index:900;width:50px;height:50px;border-radius:16px;border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 8px 25px rgba(0,0,0,0.3);transition:transform 0.2s}
.btn-float:active{transform:scale(0.9)}
.btn-add{bottom:30px;right:20px;background:linear-gradient(135deg,var(--accent),#ee5a24)}
.map-legend{position:fixed;bottom:30px;left:20px;z-index:900;background:var(--glass);backdrop-filter:blur(10px);border-radius:12px;padding:10px 14px;font-size:11px;display:flex;flex-direction:column;gap:4px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* STATS VIEW */
#statsView{padding:80px 20px 40px}
.stats-hero{text-align:center;padding:30px 0 20px}
.stats-hero h2{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-hero p{color:var(--text2);margin-top:4px;font-size:14px}
.stat-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:500px;margin:20px auto}
.stat-card{background:var(--card);border-radius:16px;padding:20px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
.stat-card .num{font-size:36px;font-weight:800;line-height:1}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:6px;text-transform:uppercase;letter-spacing:1px}
.stat-card:nth-child(1) .num{color:var(--accent)}
.stat-card:nth-child(2) .num{color:var(--accent2)}
.stat-card:nth-child(3) .num{color:var(--accent3)}
.stat-card:nth-child(4) .num{color:var(--accent4)}

.section-title{font-size:16px;font-weight:700;margin:30px 0 12px;padding-left:4px}
.country-list{max-width:500px;margin:0 auto}
.country-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--card);border-radius:12px;margin:6px 0}
.country-item .flag{font-size:20px;margin-right:8px}
.country-item .name{font-weight:600;font-size:14px}
.country-item .count{color:var(--text2);font-size:13px}
.bar-chart{max-width:500px;margin:0 auto}
.bar-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.bar-label{width:60px;font-size:12px;color:var(--text2);text-align:right}
.bar-track{flex:1;height:24px;background:var(--card);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;min-width:30px;transition:width 0.5s}
.timeline-list{max-width:500px;margin:0 auto}
.timeline-item{display:flex;gap:12px;padding:8px 0;border-left:2px solid var(--card2);margin-left:8px;padding-left:16px}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0;margin-left:-22px}
.timeline-item .t-name{font-weight:600;font-size:14px}
.timeline-item .t-date{font-size:12px;color:var(--text2)}

/* LIST VIEW */
#listView{padding:80px 20px 40px}
.list-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;max-width:500px;margin-left:auto;margin-right:auto}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.2s}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.place-cards{max-width:500px;margin:0 auto}
.place-card{background:var(--card);border-radius:16px;padding:16px;margin:10px 0;border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:transform 0.2s}
.place-card:active{transform:scale(0.98)}
.place-card-header{display:flex;justify-content:space-between;align-items:start}
.place-card .pc-name{font-size:16px;font-weight:700}
.place-card .pc-country{font-size:12px;color:var(--text2)}
.place-card .pc-meta{display:flex;gap:8px;margin-top:8px;font-size:12px;color:var(--text2)}
.place-card .pc-meta span{background:var(--card2);padding:3px 8px;border-radius:8px}
.place-card .pc-status{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.pc-visited{background:rgba(46,213,115,0.15);color:#2ed573}
.pc-wishlist{background:rgba(255,159,243,0.15);color:var(--accent4)}
.place-card img{width:100%;height:120px;object-fit:cover;border-radius:10px;margin-top:10px}
.place-card .pc-notes{font-size:13px;color:var(--text2);margin-top:8px;font-style:italic}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:20px;font-weight:700;margin-bottom:16px}
.modal label{display:block;margin:12px 0 4px;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.modal input,.modal textarea,.modal select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:var(--bg);color:var(--text);font-size:15px;font-family:'Inter',sans-serif}
.modal textarea{height:60px;resize:none}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent)}
.geo-item{padding:10px 12px;margin:3px 0;background:var(--bg);border:1px solid rgba(255,255,255,0.08);border-radius:10px;cursor:pointer;font-size:13px;transition:background 0.2s}
.geo-item:hover,.geo-item:active{background:var(--card2)}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-row button{flex:1;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-save{background:linear-gradient(135deg,var(--accent),#ee5a24);color:#fff}
.btn-cancel{background:var(--card2);color:var(--text)}
.btn-delete{background:rgba(255,46,46,0.15);color:#ff4444;margin-top:10px;padding:12px;border-radius:14px;border:none;width:100%;font-size:14px;cursor:pointer;font-weight:600;display:none}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--text)!important;border-radius:14px!important;box-shadow:0 10px 30px rgba(0,0,0,0.4)!important}
.leaflet-popup-tip{background:var(--card)!important}
.popup-place{font-weight:700;font-size:15px}
.popup-meta{font-size:12px;color:var(--text2);margin-top:2px}
.popup-note{font-size:12px;margin-top:6px;color:var(--text2);font-style:italic}
.popup-img{width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:6px}

@media(min-width:768px){
  .stat-cards{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div><h1>🌍 JP's Travel World</h1><div class="subtitle">Born Explorer ♐ · Sagittarian Wanderer</div></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="mapView">Map</button>
    <button class="nav-tab" data-view="statsView">Stats</button>
    <button class="nav-tab" data-view="listView">List</button>
  </div>
</nav>

<!-- MAP VIEW -->
<div class="view active" id="mapView">
  <div id="map"></div>
  <button class="btn-float btn-add" id="btnAdd">+</button>
  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>Visited</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div>Lived</div>
    <div class="legend-item"><div class="legend-dot" style="background:#feca57"></div>Birth Place</div>
    <div class="legend-item"><div class="legend-dot" style="background:#95a5a6"></div>Transit</div>
    <div class="legend-item"><div class="legend-dot" style="background:transparent;border:2px dashed #fff"></div>Wishlist</div>
  </div>
</div>

<!-- STATS VIEW -->
<div class="view" id="statsView">
  <div class="stats-hero">
    <h2>Travel Dashboard</h2>
    <p>Every journey tells a story</p>
  </div>
  <div class="stat-cards" id="statCards"></div>
  <div class="section-title">🗺️ Countries Explored</div>
  <div class="country-list" id="countryList"></div>
  <div class="section-title">📊 Categories</div>
  <div class="bar-chart" id="catChart"></div>
  <div class="section-title">🚀 How I Travel</div>
  <div class="bar-chart" id="travelChart"></div>
  <div class="section-title">📌 Place Types</div>
  <div class="bar-chart" id="statusChart"></div>
  <div class="section-title">⏳ Recent Adventures</div>
  <div class="timeline-list" id="timeline"></div>
</div>

<!-- LIST VIEW -->
<div class="view" id="listView">
  <div style="max-width:500px;margin:0 auto">
    <div class="list-filters" id="listFilters"></div>
  </div>
  <div class="place-cards" id="placeCards"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Place</h2>
    <label>Status</label>
    <select id="inpStatus"><option value="visited">✅ Visited</option><option value="lived">🏠 Lived Here</option><option value="birthplace">🎒 Birth Place</option><option value="transit">🚏 Transit / Passing Through</option><option value="wishlist">🔮 Future Adventure</option></select>
    <label>Place name</label>
    <input type="text" id="inpName" placeholder="Search city, country...">
    <div id="geoResults" style="max-height:140px;overflow-y:auto;margin-top:4px"></div>
    <label>Country</label>
    <input type="text" id="inpCountry" placeholder="Auto-filled from search">
    <label>Date</label>
    <input type="date" id="inpDate">
    <label>Category</label>
    <select id="inpCat"><option value="city">🏙️ City</option><option value="nature">🌿 Nature</option><option value="beach">🏖️ Beach</option><option value="mountain">⛰️ Mountain</option><option value="food">🍽️ Food</option><option value="work">💼 Work</option><option value="other">📍 Other</option></select>
    <label>Times Visited</label>
    <input type="number" id="inpVisits" min="1" value="1" style="width:80px">
    <label>How did you get there?</label>
    <select id="inpTravel"><option value="flight">✈️ Flight</option><option value="own-car">🚗 Own Car</option><option value="rental">🚙 Rental Car</option><option value="train">🚆 Train</option><option value="bus">🚌 Bus</option><option value="cycle">🚲 Cycle</option><option value="walk">🚶 Walk</option><option value="boat">⛴️ Boat</option><option value="other">🧭 Other</option></select>
    <label>Notes</label>
    <textarea id="inpNotes" placeholder="What made this place special?"></textarea>
    <label>Rating</label>
    <select id="inpRating"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select>
    <label>Photo</label>
    <input type="file" id="inpPhoto" accept="image/*" style="padding:8px">
    <div id="photoPreview" style="margin-top:6px"></div>
    <div class="btn-row"><button class="btn-cancel" id="btnCancel">Cancel</button><button class="btn-save" id="btnSave">Save</button></div>
    <button class="btn-delete" id="btnDelete">🗑️ Delete this place</button>
  </div>
</div>

<script>
const STORE='myTravelPlaces';let places=JSON.parse(localStorage.getItem(STORE)||'[]'),markers={},editId=null,pendingLatLng=null,pathLine=null;
const catColors={city:'#ff6b6b',nature:'#2ecc71',beach:'#f39c12',mountain:'#9b59b6',food:'#e67e22',work:'#3498db',other:'#95a5a6'};
const catEmoji={city:'🏙️',nature:'🌿',beach:'🏖️',mountain:'⛰️',food:'🍽️',work:'💼',other:'📍'};

// Nav
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');document.getElementById(t.dataset.view).classList.add('active');
  if(t.dataset.view==='statsView')renderStats();
  if(t.dataset.view==='listView')renderList();
  if(t.dataset.view==='mapView')map.invalidateSize();
}));

// Map
const map=L.map('map',{zoomControl:false}).setView([25,10],3);
const satellite=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19});
const labels=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:19});
satellite.addTo(map);labels.addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

const statusColors={visited:'#ff6b6b',lived:'#2ecc71',birthplace:'#feca57',transit:'#95a5a6',wishlist:'transparent'};
const statusEmoji={visited:'✅',lived:'🏠',birthplace:'🎒',transit:'🚏',wishlist:'🔮'};
const travelEmoji={flight:'✈️','own-car':'🚗',rental:'🚙',train:'🚆',bus:'🚌',cycle:'🚲',walk:'🚶',boat:'⛴️',other:'🧭'};

function makeIcon(cat,status){
  const c=statusColors[status]||statusColors.visited;
  const s=status==='wishlist';
  return L.divIcon({className:'',html:`<div style="width:${s?12:14}px;height:${s?12:14}px;border-radius:50%;background:${s?'transparent':c};border:2px ${s?'dashed':'solid'} ${s?'#fff':c};box-shadow:0 2px 8px rgba(0,0,0,0.4);${s?'opacity:0.7':''}"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
}
function save(){localStorage.setItem(STORE,JSON.stringify(places))}
function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  if(pathLine)map.removeLayer(pathLine);
  places.forEach(p=>{
    const m=L.marker([p.lat,p.lng],{icon:makeIcon(p.cat,p.status)}).addTo(map);
    const tag=(statusEmoji[p.status]||'✅')+' '+(p.status||'visited');
    const visits=p.visits>1?` · ${p.visits}x`:'';
    const travel=p.travel?` · ${travelEmoji[p.travel]||''}`:'';
    const img=p.photo?`<img class="popup-img" src="${p.photo}">`:'';
    m.bindPopup(`<div class="popup-place">${p.name}</div><div class="popup-meta">${tag}${visits}${travel} · ${p.date||''} · ${p.country||''}</div>${p.notes?'<div class="popup-note">'+p.notes+'</div>':''}${img}<div class="popup-meta">${'⭐'.repeat(p.rating||3)}</div>`,{maxWidth:260});
    m.on('click',()=>openEdit(p.id));markers[p.id]=m;
  });
  const visited=[...places].filter(p=>p.date&&p.status!=='wishlist').sort((a,b)=>a.date.localeCompare(b.date));
  if(visited.length>1)pathLine=L.polyline(visited.map(p=>[p.lat,p.lng]),{color:'#ff6b6b',weight:1.5,opacity:0.25,dashArray:'6,12'}).addTo(map);
}

// Geocoding
let geoTimer=null;const inpName=document.getElementById('inpName'),geoResults=document.getElementById('geoResults');
inpName.addEventListener('input',()=>{clearTimeout(geoTimer);const q=inpName.value.trim();if(q.length<2){geoResults.innerHTML='';return;}
  geoTimer=setTimeout(()=>{fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`).then(r=>r.json()).then(res=>{
    geoResults.innerHTML=res.map(r=>`<div class="geo-item" data-lat="${r.lat}" data-lng="${r.lon}" data-name="${r.display_name.split(',')[0]}" data-country="${r.address?.country||''}">${r.display_name}</div>`).join('');
    geoResults.querySelectorAll('.geo-item').forEach(el=>el.addEventListener('click',()=>{
      inpName.value=el.dataset.name;document.getElementById('inpCountry').value=el.dataset.country;
      pendingLatLng={lat:parseFloat(el.dataset.lat),lng:parseFloat(el.dataset.lng)};geoResults.innerHTML='';
    }));
  }).catch(()=>{})},400);
});

map.on('click',e=>openModal(e.latlng.lat,e.latlng.lng,null));
document.getElementById('btnAdd').addEventListener('click',()=>{const c=map.getCenter();openModal(c.lat,c.lng,null)});

function openModal(lat,lng,place){
  editId=place?place.id:null;pendingLatLng=place?null:{lat,lng};
  document.getElementById('modalTitle').textContent=place?'Edit Place':'Add Place';
  document.getElementById('inpStatus').value=place?(place.status||'visited'):'visited';
  document.getElementById('inpName').value=place?place.name:'';
  document.getElementById('inpCountry').value=place?place.country:'';
  document.getElementById('inpDate').value=place?place.date:new Date().toISOString().split('T')[0];
  document.getElementById('inpCat').value=place?place.cat:'city';
  document.getElementById('inpVisits').value=place?(place.visits||1):1;
  document.getElementById('inpTravel').value=place?(place.travel||'flight'):'flight';
  document.getElementById('inpNotes').value=place?place.notes:'';
  document.getElementById('inpRating').value=place?(place.rating||3):5;
  document.getElementById('inpPhoto').value='';
  document.getElementById('photoPreview').innerHTML=place?.photo?`<img src="${place.photo}" style="width:100%;max-height:100px;object-fit:cover;border-radius:10px">`:'';
  document.getElementById('btnDelete').style.display=place?'block':'none';
  geoResults.innerHTML='';document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');geoResults.innerHTML='';editId=null;pendingLatLng=null}
function openEdit(id){const p=places.find(x=>x.id===id);if(p)openModal(p.lat,p.lng,p)}
document.getElementById('btnCancel').addEventListener('click',closeModal);
document.getElementById('btnDelete').addEventListener('click',()=>{if(editId&&confirm('Delete this place?')){places=places.filter(p=>p.id!==editId);save();renderMarkers();closeModal()}});

document.getElementById('btnSave').addEventListener('click',()=>{
  const name=document.getElementById('inpName').value.trim();if(!name){alert('Enter a place name');return}
  const data={name,country:document.getElementById('inpCountry').value.trim(),date:document.getElementById('inpDate').value,cat:document.getElementById('inpCat').value,status:document.getElementById('inpStatus').value,visits:parseInt(document.getElementById('inpVisits').value)||1,travel:document.getElementById('inpTravel').value,notes:document.getElementById('inpNotes').value.trim(),rating:parseInt(document.getElementById('inpRating').value)};
  function done(photo){
    if(photo)data.photo=photo;else if(editId){const o=places.find(x=>x.id===editId);if(o?.photo)data.photo=o.photo}
    if(editId)Object.assign(places.find(x=>x.id===editId),data);
    else{const c=pendingLatLng||map.getCenter();places.push({id:Date.now().toString(),lat:c.lat,lng:c.lng,...data})}
    save();renderMarkers();closeModal();
  }
  const f=document.getElementById('inpPhoto').files[0];
  if(f){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas'),mx=400,s=Math.min(mx/img.width,mx/img.height,1);c.width=img.width*s;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);done(c.toDataURL('image/jpeg',0.7))};img.src=e.target.result};r.readAsDataURL(f)}else done(null);
});

// STATS
function renderStats(){
  const v=places.filter(p=>p.status!=='wishlist'),w=places.filter(p=>p.status==='wishlist');
  const countries=[...new Set(v.map(p=>p.country).filter(Boolean))];
  const totalRating=v.reduce((s,p)=>s+(p.rating||0),0);
  const avgRating=v.length?totalRating/v.length:0;
  const totalVisits=v.reduce((s,p)=>s+(p.visits||1),0);
  document.getElementById('statCards').innerHTML=`
    <div class="stat-card"><div class="num">${v.length}</div><div class="label">Places</div></div>
    <div class="stat-card"><div class="num">${countries.length}</div><div class="label">Countries</div></div>
    <div class="stat-card"><div class="num">${totalVisits}</div><div class="label">Total Visits</div></div>
    <div class="stat-card"><div class="num">${w.length}</div><div class="label">Wishlist</div></div>`;
  // Countries
  const cc={};v.forEach(p=>{if(p.country)cc[p.country]=(cc[p.country]||0)+1});
  const sorted=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  document.getElementById('countryList').innerHTML=sorted.length?sorted.map(([c,n])=>`<div class="country-item"><span><span class="name">${c}</span></span><span class="count">${n} place${n>1?'s':''}</span></div>`).join(''):'<div class="empty-state">No countries yet</div>';
  // Categories
  const cats={};places.forEach(p=>{cats[p.cat]=(cats[p.cat]||0)+1});
  const maxCat=Math.max(...Object.values(cats),1);
  const catSorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  document.getElementById('catChart').innerHTML=catSorted.map(([c,n])=>`<div class="bar-row"><div class="bar-label">${catEmoji[c]||''} ${c}</div><div class="bar-track"><div class="bar-fill" style="width:${n/maxCat*100}%;background:${catColors[c]||'#666'}">${n}</div></div></div>`).join('');
  // Travel modes
  const trvl={};places.filter(p=>p.status!=='wishlist').forEach(p=>{const t=p.travel||'other';trvl[t]=(trvl[t]||0)+1});
  const maxT=Math.max(...Object.values(trvl),1);
  const trvlSorted=Object.entries(trvl).sort((a,b)=>b[1]-a[1]);
  const trvlColors={flight:'#48dbfb','own-car':'#ff6b6b',rental:'#feca57',train:'#2ecc71',bus:'#f39c12',cycle:'#a29bfe',walk:'#fd79a8',boat:'#00cec9',other:'#95a5a6'};
  document.getElementById('travelChart').innerHTML=trvlSorted.map(([t,n])=>`<div class="bar-row"><div class="bar-label">${travelEmoji[t]||''} ${t}</div><div class="bar-track"><div class="bar-fill" style="width:${n/maxT*100}%;background:${trvlColors[t]||'#666'}">${n}</div></div></div>`).join('');
  // Status breakdown
  const sts={};places.forEach(p=>{const s=p.status||'visited';sts[s]=(sts[s]||0)+1});
  const maxS=Math.max(...Object.values(sts),1);
  const stsSorted=Object.entries(sts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('statusChart').innerHTML=stsSorted.map(([s,n])=>`<div class="bar-row"><div class="bar-label">${statusEmoji[s]||''} ${s}</div><div class="bar-track"><div class="bar-fill" style="width:${n/maxS*100}%;background:${statusColors[s]||'#666'}">${n}</div></div></div>`).join('');
  // Timeline
  const recent=[...v].filter(p=>p.date).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  document.getElementById('timeline').innerHTML=recent.length?recent.map(p=>`<div class="timeline-item"><div class="timeline-dot"></div><div><div class="t-name">${p.name}</div><div class="t-date">${p.date} · ${p.country||''} · ${'⭐'.repeat(p.rating||3)}</div></div></div>`).join(''):'<div class="empty-state">Add places to see your timeline</div>';
}

// LIST
let listFilter='all';
function renderList(){
  const filters=['all','visited','lived','birthplace','transit','wishlist'];
  document.getElementById('listFilters').innerHTML=filters.map(f=>`<button class="filter-btn ${listFilter===f?'active':''}" data-f="${f}">${f==='all'?'All':(statusEmoji[f]||'')+' '+f}</button>`).join('');
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{listFilter=b.dataset.f;renderList()}));
  let filtered=listFilter==='all'?places:places.filter(p=>(p.status||'visited')===listFilter);
  filtered=[...filtered].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const el=document.getElementById('placeCards');
  if(!filtered.length){el.innerHTML='<div class="empty-state"><div class="emoji">🌍</div>No places yet.<br>Tap the map or + to start exploring!</div>';return}
  el.innerHTML=filtered.map(p=>`<div class="place-card" data-id="${p.id}">
    <div class="place-card-header"><div><div class="pc-name">${p.name}</div><div class="pc-country">${p.country||''}</div></div><span class="pc-status ${p.status==='wishlist'?'pc-wishlist':'pc-visited'}">${(statusEmoji[p.status]||'✅')+' '+(p.status||'visited')}</span></div>
    <div class="pc-meta"><span>${catEmoji[p.cat]||''} ${p.cat}</span><span>${p.date||''}</span><span>${travelEmoji[p.travel]||''} ${p.travel||''}</span>${p.visits>1?`<span>${p.visits}x</span>`:''}><span>${'⭐'.repeat(p.rating||3)}</span></div>
    ${p.notes?'<div class="pc-notes">"'+p.notes+'"</div>':''}
    ${p.photo?'<img src="'+p.photo+'">':''}
    <div style="display:flex;gap:8px;margin-top:10px"><button class="pc-edit" data-id="${p.id}" style="flex:1;padding:8px;border-radius:10px;border:none;background:var(--card2);color:var(--text);font-size:13px;cursor:pointer">✏️ Edit</button><button class="pc-del" data-id="${p.id}" style="flex:1;padding:8px;border-radius:10px;border:none;background:rgba(255,46,46,0.15);color:#ff4444;font-size:13px;cursor:pointer">🗑️ Delete</button></div>
  </div>`).join('');
  el.querySelectorAll('.pc-edit').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openEdit(b.dataset.id)}));
  el.querySelectorAll('.pc-del').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete '+places.find(x=>x.id===b.dataset.id)?.name+'?')){places=places.filter(p=>p.id!==b.dataset.id);save();renderMarkers();renderList()}}));
  el.querySelectorAll('.place-card').forEach(c=>c.addEventListener('click',()=>{
    const p=places.find(x=>x.id===c.dataset.id);if(!p)return;
    document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    document.querySelector('[data-view="mapView"]').classList.add('active');
    document.getElementById('mapView').classList.add('active');
    setTimeout(()=>{map.invalidateSize();map.setView([p.lat,p.lng],12);markers[p.id]?.openPopup()},100);
  }));
}

renderMarkers();
</script>
</body>
</html>
