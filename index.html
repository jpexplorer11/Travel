<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b1e">
<title>JP's Travel World</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<nav class="nav">
  <div><h1>🌍 JP's Travel World</h1><div class="sub">Born Explorer ♐ · Every place tells a story</div></div>
  <div class="tabs">
    <button class="tab on" data-v="vMap">Map</button>
    <button class="tab" data-v="vInsights">Journey</button>
    <button class="tab" data-v="vList">Places</button>
  </div>
</nav>

<!-- MAP -->
<div class="v on" id="vMap"><div id="map"></div><button class="fab fab-add" id="btnAdd">+</button></div>

<!-- INSIGHTS -->
<div class="v" id="vInsights">
  <div class="insights">
    <div class="hero"><h2>My Journey So Far</h2><p>Every pin is a memory, every path a story</p></div>
    <div class="cards" id="iCards"></div>
    <div class="sec">🏠 Life Chapters</div>
    <div id="iChapters"></div>
    <div class="sec">🗺️ Countries</div>
    <div id="iCountries"></div>
    <div class="sec">🚀 How I Travel</div>
    <div id="iTravel"></div>
    <div class="sec">⏳ Timeline</div>
    <div id="iTimeline"></div>
    <div class="sec">💾 Backup</div>
    <div class="sync">
      <button class="sync-exp" id="btnExp">📤 Export</button>
      <label class="sync-imp">📥 Import<input type="file" id="btnImp" accept=".json" style="display:none"></label>
    </div>
  </div>
</div>

<!-- LIST -->
<div class="v" id="vList">
  <div class="list-v">
    <div class="filters" id="fltrs"></div>
    <div id="pCards"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="ov">
  <div class="modal">
    <h2 id="mTitle">Add Memory</h2>
    <label>How do you remember this place?</label>
    <select id="iSt"><option value="visited">✅ Visited</option><option value="lived">🏠 Lived Here</option><option value="birthplace">🎒 Where I Was Born</option><option value="transit">🚏 Passing Through</option><option value="wishlist">🔮 Dream Destination</option></select>
    <label>Place</label>
    <input type="text" id="iNm" placeholder="Search a city or place...">
    <div id="gR" style="max-height:130px;overflow-y:auto;margin-top:3px"></div>
    <label>Country</label>
    <input type="text" id="iCo" placeholder="Auto-filled">
    <label>When</label>
    <input type="date" id="iDt">
    <label>Category</label>
    <select id="iCat"><option value="city">🏙️ City</option><option value="nature">🌿 Nature</option><option value="beach">🏖️ Beach</option><option value="mountain">⛰️ Mountain</option><option value="food">🍽️ Food</option><option value="work">💼 Work</option><option value="other">📍 Other</option></select>
    <label>How did you get there?</label>
    <select id="iTr"><option value="flight">✈️ Flight</option><option value="own-car">🚗 Own Car</option><option value="rental">🚙 Rental</option><option value="train">🚆 Train</option><option value="bus">🚌 Bus</option><option value="cycle">🚲 Cycle</option><option value="walk">🚶 Walk</option><option value="boat">⛴️ Boat</option><option value="other">🧭 Other</option></select>
    <label>Times visited</label>
    <input type="number" id="iVis" min="1" value="1" style="width:80px">
    <label>Rating</label>
    <select id="iRat"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select>
    <label>✨ Memory highlight</label>
    <input type="text" id="iMem" placeholder="One line that captures this place...">
    <label>Notes</label>
    <textarea id="iNo" placeholder="The story behind this place..."></textarea>
    <label>Photo</label>
    <input type="file" id="iPh" accept="image/*" style="padding:6px">
    <div id="phPrev" style="margin-top:4px"></div>
    <div class="row"><button class="bcancel" id="btnX">Cancel</button><button class="bsave" id="btnS">Save Memory</button></div>
    <button class="bdel" id="btnD">🗑️ Remove this place</button>
  </div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
